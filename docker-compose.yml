version: "3.9"

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3005:3005"
    environment:
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - FRONTEND_URL=http://localhost
    depends_on:
      - user-service
      - product-service
    restart: unless-stopped

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=change-me-in-production
      - PORT=3001
    restart: unless-stopped

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3005/api
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
